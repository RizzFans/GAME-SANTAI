<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Block Puzzle</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div id="menu" class="menu">
    <div class="bg-block b1"></div>
    <div class="bg-block b2"></div>
    <div class="bg-block b3"></div>
    <div class="bg-block b4"></div>
    <div class="bg-block b5"></div>

    <div class="menu-box">

        <h1 class="logo">
            BLOCK PUZZLE
        </h1>

        <p class="subtitle">
            Susun balok dan pecahkan rekor!
        </p>

        <div class="menu-best">
            BEST SCORE:
            <span id="menuBest">0</span>
        </div>
        <button id="playBtn" class="menu-btn">
            ▶ MAIN
        </button>
        <button id="helpBtn" class="menu-btn secondary">
            ❓ CARA MAIN
        </button>
    </div>
</div>

<div class="app hide" id="gameApp">

<header>

<h1>BLOCK PUZZLE</h1>

<button id="musicBtn">
    🔊 Musik
</button>    
<div class="score">

<div class="card">
<span>SCORE</span>
<h2 id="score">0</h2>
</div>

<div class="card">
<span>BEST</span>
<h2 id="best">0</h2>
</div>

</div>

</header>

<div id="board" class="board"></div>

<div id="pieces" class="pieces"></div>

<div id="comboText" class="combo"></div>

</div>

<div id="over" class="over hide">

<div class="box">

<h2>CUPU LU</h2>

<h1 id="final">0</h1>

<button id="restart">
MAIN LAGI
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
